spring.application.name=setlist-bridge

# setlist.fm client config for the `test` profile.
# base-url is overridden per-test to point at the WireMock server.
setlistfm.base-url=http://localhost
setlistfm.api-key=test-api-key

# Spotify client config for the `test` profile.
# base-url and token-uri are overridden per-test to point at the WireMock server.
spotify.base-url=http://localhost

spring.security.oauth2.client.registration.spotify.client-id=test-client-id
spring.security.oauth2.client.registration.spotify.client-authentication-method=none
spring.security.oauth2.client.registration.spotify.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.spotify.scope=playlist-modify-public,playlist-modify-private
spring.security.oauth2.client.registration.spotify.redirect-uri=http://localhost:8080/callback

spring.security.oauth2.client.provider.spotify.authorization-uri=http://localhost/authorize
spring.security.oauth2.client.provider.spotify.token-uri=http://localhost/api/token

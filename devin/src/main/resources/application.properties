spring.application.name=setlist-bridge

# Spotify Web API
spotify.base-url=https://api.spotify.com

# Spotify OAuth2 client registration (Authorization Code + PKCE)
spring.security.oauth2.client.registration.spotify.client-id=${SPOTIFY_CLIENT_ID}
spring.security.oauth2.client.registration.spotify.client-authentication-method=none
spring.security.oauth2.client.registration.spotify.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.spotify.scope=playlist-modify-public,playlist-modify-private
spring.security.oauth2.client.registration.spotify.redirect-uri=http://localhost:8080/callback

spring.security.oauth2.client.provider.spotify.authorization-uri=https://accounts.spotify.com/authorize
spring.security.oauth2.client.provider.spotify.token-uri=https://accounts.spotify.com/api/token
